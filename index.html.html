<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>WebPay — Криптокошелёк</title>
    <style>
        /* ===== ЗАГРУЗОЧНЫЙ ЭКРАН С НЕОНОВЫМ ГЛАЗОМ ===== */
        .splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 30%, #0a0f1e, #03060c);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }
        .splash-screen.hide {
            opacity: 0;
            visibility: hidden;
        }
        .eye-container {
            position: relative;
            width: 140px;
            height: 90px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .eye-svg {
            width: 100%;
            height: auto;
        }
        .eye-outer {
            stroke: #2affdf;
            stroke-width: 3;
            fill: none;
            stroke-linecap: round;
        }
        .eye-pupil {
            fill: #2affdf;
            filter: drop-shadow(0 0 8px #2affdf);
            transition: transform 0.2s ease;
        }
        .splash-text {
            margin-top: 2rem;
            text-align: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .splash-text h2 {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #ffffff, #5bc0ff, #00f2ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: 1px;
        }
        .splash-text p {
            font-size: 0.8rem;
            color: #ffffff;
            margin-top: 0.3rem;
            letter-spacing: 1px;
        }
        
        /* ОСНОВНЫЕ СТИЛИ — ВЕЗДЕ БЕЛЫЙ ТЕКСТ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at 20% 30%, #0a0f1e, #03060c);
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, 'Poppins', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        body.light { background: #f0f2f5; }
        body.light .glass-card { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); border: 1px solid rgba(0, 0, 0, 0.1); box-shadow: 0 25px 45px rgba(0, 0, 0, 0.1); }
        body.light .logo h1 { background: linear-gradient(135deg, #1a2a6c, #b21f1f); -webkit-background-clip: text; background-clip: text; }
        body.light .step-title, body.light label, body.light .action-title, body.light .balance-amount, body.light .menu-item span, body.light .settings-label, body.light .history-item, body.light .crypto-row span { color: #1a1a2e; }
        body.light input, body.light select { background: rgba(255, 255, 255, 0.9); color: #1a1a2e; border-color: #ccc; }

        .welcome-container { max-width: 600px; width: 100%; margin: 0 auto; }
        .glass-card { background: rgba(6, 12, 24, 0.65); backdrop-filter: blur(12px); border-radius: 2rem; padding: 1.5rem; box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(0, 255, 255, 0.1); border: 1px solid rgba(0, 230, 250, 0.25); transition: all 0.2s ease; }
        .logo { text-align: center; margin-bottom: 1rem; }
        .logo h1 { font-size: 2.5rem; font-weight: 700; background: linear-gradient(135deg, #ffffff, #5bc0ff, #00f2ff); -webkit-background-clip: text; background-clip: text; color: transparent; text-shadow: 0 0 12px rgba(0, 242, 255, 0.4); }
        .step-badge { display: inline-block; background: rgba(0, 230, 250, 0.15); padding: 0.25rem 1rem; border-radius: 40px; font-size: 0.7rem; color: #7efff0; border: 1px solid rgba(42, 255, 223, 0.4); }
        .step-title { font-size: 1.2rem; font-weight: 600; color: #ffffff; margin: 0.5rem 0 0.2rem; text-align: center; }
        .form-group { margin-bottom: 1rem; }
        label { display: block; font-size: 0.8rem; font-weight: 500; color: #ffffff; margin-bottom: 0.4rem; }
        input, select { width: 100%; background: rgba(2, 8, 18, 0.7); border: 1px solid rgba(0, 210, 210, 0.4); border-radius: 1.2rem; padding: 0.8rem 1rem; font-size: 1rem; color: #ffffff; font-family: inherit; outline: none; }
        input:focus { border-color: #2affdf; box-shadow: 0 0 0 2px rgba(42, 255, 223, 0.2); }
        .error-message { font-size: 0.7rem; color: #ff6b8b; margin-top: 0.3rem; margin-left: 0.5rem; }
        .buttons-row { display: flex; justify-content: space-between; gap: 1rem; margin-top: 1.5rem; }
        .btn-secondary { background: rgba(20, 30, 50, 0.8); border: 1px solid rgba(0, 210, 210, 0.5); color: #ffffff; font-size: 0.9rem; font-weight: 500; padding: 0.6rem 1.2rem; border-radius: 3rem; cursor: pointer; text-align: center; transition: 0.2s; }
        .btn-secondary:hover { background: rgba(42, 255, 223, 0.2); border-color: #2affdf; }
        .btn-primary { background: linear-gradient(95deg, #0c1b2f, #041a2e); border: 1px solid #2affdf; color: #ffffff; font-size: 0.9rem; font-weight: 600; padding: 0.6rem 1.2rem; border-radius: 3rem; cursor: pointer; text-align: center; transition: 0.2s; }
        .btn-primary:hover:not(:disabled) { box-shadow: 0 0 12px #2affdf; }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
        .card-preview { background: linear-gradient(135deg, #1a2a6c, #b21f1f, #fdbb4d); border-radius: 1.2rem; padding: 1rem; margin: 1rem 0; color: white; box-shadow: 0 15px 25px rgba(0,0,0,0.3); transition: background 0.3s ease; aspect-ratio: 16 / 10; display: flex; flex-direction: column; justify-content: space-between; }
        .card-header { display: flex; justify-content: space-between; align-items: flex-start; }
        .card-tariff { background: rgba(0,0,0,0.4); padding: 0.2rem 0.6rem; border-radius: 20px; font-size: 0.7rem; font-weight: bold; backdrop-filter: blur(4px); }
        .card-number { font-size: 1rem; letter-spacing: 1px; font-family: monospace; margin: 0.5rem 0; }
        .color-palette { display: flex; gap: 12px; justify-content: center; margin: 1rem 0; flex-wrap: wrap; }
        .color-circle { width: 36px; height: 36px; border-radius: 50%; cursor: pointer; border: 2px solid rgba(255,255,255,0.5); transition: transform 0.2s; }
        .tariff-buttons { display: flex; flex-wrap: wrap; gap: 8px; margin: 1rem 0; }
        .tariff-btn { background: rgba(2, 8, 18, 0.7); border: 1px solid rgba(0, 210, 210, 0.4); padding: 0.4rem 0.8rem; border-radius: 2rem; color: #ffffff; cursor: pointer; font-size: 0.8rem; }
        .tariff-btn.active { background: #2affdf; color: #03060c; box-shadow: 0 0 10px #2affdf; }
        .checkbox-group { display: flex; align-items: center; gap: 10px; margin: 0.7rem 0; }
        .checkbox-group label { margin: 0; font-size: 0.8rem; color: #ffffff; }
        .checkbox-group input { width: 20px; height: 20px; margin: 0; accent-color: #2affdf; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: rgba(6, 12, 24, 0.95); border: 1px solid #2affdf; border-radius: 2rem; padding: 1.5rem; text-align: center; max-width: 320px; width: 85%; color: white; }
        .spinner { width: 50px; height: 50px; border: 4px solid rgba(42,255,223,0.3); border-top: 4px solid #2affdf; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 1rem auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .check-animation { width: 60px; height: 60px; margin: 1rem auto; }
        .check-animation svg { width: 100%; height: 100%; }
        .check-circle { stroke-dasharray: 166; stroke-dashoffset: 166; stroke-width: 2; stroke: #2affdf; fill: none; animation: strokeDraw 0.5s forwards; }
        .check-mark { stroke-dasharray: 48; stroke-dashoffset: 48; stroke-width: 3; stroke: #2affdf; fill: none; animation: strokeDraw 0.4s 0.3s forwards; }
        .cross-mark { stroke-dasharray: 48; stroke-dashoffset: 48; stroke-width: 3; stroke: #ff4d6d; fill: none; animation: strokeDraw 0.4s 0.3s forwards; }
        @keyframes strokeDraw { to { stroke-dashoffset: 0; } }
        .fade-in { animation: fadeSlideUp 0.35s ease-out; }
        @keyframes fadeSlideUp { from { opacity: 0; transform: translateY(15px);} to { opacity: 1; transform: translateY(0);} }
        .action-card { cursor: pointer; background: rgba(2, 8, 18, 0.8); border-radius: 1.5rem; padding: 0.8rem; text-align: center; }
        .neon-icon svg { width: 45px; height: 45px; filter: drop-shadow(0 0 4px cyan); }
        .action-title { color: #ffffff; font-weight: 600; margin: 0.3rem 0; font-size: 0.9rem; }
        .action-desc { color: #ffffff; font-size: 0.65rem; }
        .logo-sub { color: #ffffff; text-align: center; font-size: 0.75rem; }
        .bank-header { display: flex; justify-content: flex-end; margin-bottom: 0.8rem; }
        .menu-icon-btn { font-size: 1.5rem; cursor: pointer; padding: 0.4rem; background: rgba(42,255,223,0.2); border-radius: 50%; width: 42px; height: 42px; display: flex; align-items: center; justify-content: center; color: white; }
        .menu-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 0.6rem; margin: 1rem 0; }
        .menu-item { text-align: center; cursor: pointer; padding: 0.4rem; border-radius: 0.8rem; transition: 0.2s; }
        .menu-item:hover { background: rgba(42, 255, 223, 0.2); }
        .neon-icon-btn { width: 48px; height: 48px; margin: 0 auto; background: rgba(42, 255, 223, 0.1); border: 1.5px solid #2affdf; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 8px rgba(42, 255, 223, 0.4); transition: all 0.2s ease; }
        .menu-item:hover .neon-icon-btn { background: rgba(42, 255, 223, 0.25); box-shadow: 0 0 15px rgba(42, 255, 223, 0.7); transform: scale(1.02); }
        .neon-icon-btn svg { width: 26px; height: 26px; stroke: #2affdf; stroke-width: 1.8; fill: none; }
        .menu-item span { display: block; font-size: 0.6rem; margin-top: 0.4rem; color: #ffffff; }
        .balance { text-align: center; margin: 0.8rem 0; }
        .balance-label { font-size: 0.75rem; opacity: 0.7; color: #ffffff; }
        .balance-amount { font-size: 1.8rem; font-weight: bold; color: #ffffff; }
        .bank-card { background: linear-gradient(135deg, #1a2a6c, #b21f1f, #fdbb4d); border-radius: 1.2rem; padding: 1rem; margin-bottom: 0.8rem; color: white; }
        .settings-row { display: flex; justify-content: space-between; align-items: center; margin: 0.8rem 0; padding: 0.4rem 0; border-bottom: 1px solid rgba(42,255,223,0.3); }
        .settings-label { color: #ffffff; font-size: 0.9rem; }
        .theme-switch { width: 45px; height: 22px; background: #2affdf; border-radius: 30px; position: relative; cursor: pointer; }
        .theme-switch::after { content: ''; width: 18px; height: 18px; background: white; border-radius: 50%; position: absolute; top: 2px; left: 3px; transition: 0.2s; }
        body.light .theme-switch::after { left: 24px; }
        .currency-select { background: rgba(2,8,18,0.7); border-radius: 1rem; padding: 0.3rem 0.6rem; color: white; border: 1px solid #2affdf; font-size: 0.8rem; }
        .two-buttons { display: flex; gap: 1rem; margin-top: 1rem; }
        .btn-small { padding: 0.4rem 0.8rem; font-size: 0.8rem; }
        .crypto-list { margin-top: 1rem; border-top: 1px solid rgba(42,255,223,0.3); padding-top: 0.8rem; }
        .crypto-row { display: flex; justify-content: space-between; padding: 0.4rem 0; color: #ffffff; font-size: 0.75rem; }
        .history-list { max-height: 300px; overflow-y: auto; margin-top: 1rem; }
        .history-item { color: #ffffff; padding: 0.5rem; border-bottom: 1px solid rgba(42,255,223,0.2); font-size: 0.75rem; }
        .gp-modal { position: fixed; bottom: 0; left: 0; right: 0; background: white; border-radius: 20px 20px 0 0; padding: 1.2rem; z-index: 1001; animation: slideUp 0.3s ease; color: #1a1a2e; text-align: center; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .gp-amount { font-size: 1.5rem; font-weight: bold; margin: 0.3rem 0; }
        .gp-btn { background: #1a73e8; color: white; border: none; padding: 0.8rem; border-radius: 2rem; width: 100%; font-size: 0.9rem; font-weight: bold; margin-top: 0.8rem; cursor: pointer; }
        
        /* СИГНАЛЬНЫЕ ДУГИ НАД КАРТОЙ */
        .signal-waves {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            margin-bottom: 1rem;
            height: 50px;
        }
        .wave {
            width: 8px;
            height: 20px;
            background: rgba(42, 255, 223, 0.2);
            border-radius: 4px;
            transition: all 0.3s ease;
            transform-origin: bottom;
        }
        .wave.active {
            background: #2affdf;
            box-shadow: 0 0 8px #2affdf;
        }
        .wave.green {
            background: #00ff88;
            box-shadow: 0 0 12px #00ff88;
        }
        .dots-container { display: flex; justify-content: center; gap: 20px; margin: 2rem 0; }
        .dot { width: 20px; height: 20px; border-radius: 50%; background: rgba(42, 255, 223, 0.3); border: 1px solid #2affdf; transition: all 0.2s ease; }
        .dot.active { background: #2affdf; box-shadow: 0 0 8px #2affdf; }
        .dot.error { background: #ff4d6d; border-color: #ff4d6d; box-shadow: 0 0 8px #ff4d6d; }
        .dot.success { background: #00ff88; border-color: #00ff88; box-shadow: 0 0 12px #00ff88; }
        .shake { animation: shake 0.5s ease-in-out; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }
        .numpad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin: 1.5rem 0; }
        .numpad-btn { background: rgba(42, 255, 223, 0.1); border: 1px solid #2affdf; border-radius: 1.2rem; padding: 0.8rem; font-size: 1.5rem; font-weight: bold; color: #2affdf; cursor: pointer; transition: 0.2s; text-align: center; }
        .numpad-btn:hover { background: rgba(42, 255, 223, 0.3); box-shadow: 0 0 12px rgba(42, 255, 223, 0.5); }
        .delete-btn { background: rgba(255, 77, 109, 0.2); border-color: #ff4d6d; color: #ff4d6d; }
        .terminal-card { background: rgba(42, 255, 223, 0.1); border: 2px solid #2affdf; border-radius: 1.5rem; padding: 1.5rem; margin: 1rem 0; text-align: center; transition: all 0.3s ease; }
        .card-image { width: 120px; height: 180px; background: linear-gradient(135deg, #1a2a6c, #b21f1f, #fdbb4d); border-radius: 1rem; margin: 0 auto 0.5rem; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; font-family: monospace; font-size: 0.7rem; box-shadow: 0 10px 20px rgba(0,0,0,0.3); transition: all 0.3s ease; }
        .card-image.animate { transform: rotate(5deg) translateX(-10px); }
        .terminal-status { text-align: center; margin: 1rem 0; font-size: 0.9rem; color: #ffffff; }
        
        /* Дополнительные стили для перевода */
        .tab-container {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid rgba(42,255,223,0.3);
        }
        .tab {
            flex: 1;
            text-align: center;
            padding: 0.5rem;
            cursor: pointer;
            color: #bbd4ff;
            border-bottom: 2px solid transparent;
            transition: 0.2s;
        }
        .tab.active {
            color: #2affdf;
            border-bottom-color: #2affdf;
        }
        .transfer-field {
            background: rgba(2, 8, 18, 0.7);
            border: 1px solid rgba(0, 210, 210, 0.4);
            border-radius: 1.5rem;
            padding: 0.8rem 1rem;
            margin-bottom: 1rem;
        }
        .transfer-field input {
            background: transparent;
            border: none;
            padding: 0;
            font-size: 1rem;
            width: 100%;
            color: #fff;
        }
        .currency-row {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin: 0.5rem 0;
        }
        .currency-selector {
            display: flex;
            gap: 0.5rem;
            background: rgba(42,255,223,0.1);
            border-radius: 2rem;
            padding: 0.2rem;
        }
        .currency-option {
            padding: 0.3rem 0.8rem;
            border-radius: 2rem;
            cursor: pointer;
            color: white;
            font-size: 0.8rem;
        }
        .currency-option.active {
            background: #2affdf;
            color: #03060c;
        }
        .crypto-select-list {
            max-height: 200px;
            overflow-y: auto;
            margin-bottom: 1rem;
        }
        .crypto-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.5rem;
            padding: 0.5rem;
            border-radius: 1rem;
            cursor: pointer;
            background: rgba(42,255,223,0.05);
        }
        .crypto-item.selected {
            background: rgba(42,255,223,0.2);
            border: 1px solid #2affdf;
        }
        .crypto-avatar {
            width: 32px;
            height: 32px;
            background: rgba(42,255,223,0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #2affdf;
        }
        .crypto-info {
            flex: 1;
        }
        .crypto-name {
            font-weight: 600;
            color: white;
        }
        .crypto-price {
            font-size: 0.7rem;
            color: #bbd4ff;
        }
        .crypto-change {
            font-size: 0.7rem;
        }
        .crypto-change.up {
            color: #00ff88;
        }
        .crypto-change.down {
            color: #ff4d6d;
        }
        .check-row {
            display: flex;
            justify-content: space-between;
            padding: 0.5rem 0;
            border-bottom: 1px solid rgba(42,255,223,0.2);
        }
        .check-title {
            color: #bbd4ff;
        }
        .check-value {
            color: white;
            font-weight: 600;
            word-break: break-word;
            text-align: right;
            max-width: 60%;
        }
        @media (max-width: 480px) {
            body { padding: 0.8rem; }
            .glass-card { padding: 1rem; border-radius: 1.5rem; }
            .logo h1 { font-size: 2rem; }
            .menu-grid { gap: 0.4rem; }
            .neon-icon-btn { width: 40px; height: 40px; }
            .neon-icon-btn svg { width: 22px; height: 22px; }
            .menu-item span { font-size: 0.5rem; }
            .btn-primary, .btn-secondary { padding: 0.5rem 1rem; font-size: 0.8rem; }
            .numpad-btn { padding: 0.5rem; font-size: 1.2rem; }
            .dot { width: 16px; height: 16px; }
            .wave { width: 6px; }
        }
    </style>
</head>
<body>
<div class="welcome-container" id="app"></div>

<div class="splash-screen" id="splashScreen">
    <div class="eye-container">
        <svg class="eye-svg" viewBox="0 0 140 90" fill="none">
            <path class="eye-outer" d="M25,45 Q35,18 70,18 Q105,18 115,45 Q105,72 70,72 Q35,72 25,45Z" stroke="#2affdf" stroke-width="3" fill="none"/>
            <circle class="eye-pupil" cx="70" cy="45" r="14" fill="#2affdf" filter="url(#glow)"/>
            <defs><filter id="glow"><feGaussianBlur stdDeviation="3"/><feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
        </svg>
    </div>
    <div class="splash-text" id="splashText"><h2>WebPay</h2><p>ваш крипто кошелек</p></div>
</div>

<script>
    // ========== ЗАГРУЗКА ==========
    (function() {
        const splash = document.getElementById('splashScreen');
        const text = document.getElementById('splashText');
        const pupil = document.querySelector('.eye-pupil');
        if(!splash) return;
        setTimeout(() => { text.style.opacity = '1'; }, 500);
        setTimeout(() => { if(pupil) pupil.style.transform = 'scaleY(0.01)'; }, 2000);
        setTimeout(() => { if(pupil) pupil.style.transform = 'scaleY(1)'; }, 5000);
        setTimeout(() => { text.style.opacity = '0'; }, 5200);
        setTimeout(() => { splash.classList.add('hide'); setTimeout(() => splash.remove(), 500); }, 5800);
    })();

    // ========== ГЛОБАЛЬНЫЕ ДАННЫЕ ==========
    let userData = { firstName: '', lastName: '', patronymic: '', birthDate: '', city: '', address: '', passportCode: '', issueDate: '', expiryDate: '', passportPhoto: null, agreeTerms: false, cardColor: 'grad1', tariff: 'A', consents: { insurance: false, marketing: false, cardIssue: false }, pinCode: '' };
    let currentUser = null, isLoggedIn = false, currentCurrency = 'BYN', allUsers = [], transactions = [];
    const exchangeRates = { BYN: 1, USD: 3.2, EUR: 3.5 };
    const cryptoPrices = { BTC: 65000, ETH: 3200, TON: 5.5, USDT: 1, BNB: 580, SOL: 140, ADA: 0.45, DOGE: 0.12, MATIC: 0.7, TRX: 0.11 };
    const cryptoList = ['BTC', 'ETH', 'TON', 'USDT', 'BNB', 'SOL', 'ADA', 'DOGE', 'MATIC', 'TRX'];
    const gradients = { grad1: 'linear-gradient(135deg, #1a2a6c, #b21f1f, #fdbb4d)', grad2: 'linear-gradient(135deg, #0f2027, #203a43, #2c5364)', grad3: 'linear-gradient(135deg, #42275a, #734b6d)', grad4: 'linear-gradient(135deg, #232526, #414345)', grad5: 'linear-gradient(135deg, #3a1c71, #d76d77, #ffaf7b)', grad6: 'linear-gradient(135deg, #00b4db, #0083b0)' };
    
    function escapeHtml(s) { return s ? s.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]) : ''; }
    function saveCurrentUser() { if(currentUser) { localStorage.setItem('webpay_user', JSON.stringify(currentUser)); localStorage.setItem('webpay_all_users', JSON.stringify(allUsers)); saveTransactions(); } }
    function loadAllUsers() { allUsers = JSON.parse(localStorage.getItem('webpay_all_users') || '[]'); }
    function saveTransactions() { if(currentUser) localStorage.setItem(`webpay_tx_${currentUser.rawNumber}`, JSON.stringify(transactions)); }
    function loadTransactions() { if(currentUser) transactions = JSON.parse(localStorage.getItem(`webpay_tx_${currentUser.rawNumber}`) || '[]'); }
    function addTransaction(t, a, d) { transactions.unshift({ type: t, amount: a, details: d, date: new Date().toLocaleString() }); saveTransactions(); }
    
    function generateNewCard(name, tariff, color) {
        let raw = '9' + Math.floor(Math.random() * 100000000000000).toString().padStart(15, '0').slice(0, 15);
        return { rawNumber: raw, cardNumber: raw.match(/.{1,4}/g).join(' '), expiry: `12/${(new Date().getFullYear()+4).toString().slice(2)}`, cvv: Math.floor(Math.random()*900+100).toString(), balance: 0, pinCode: '1234', tariff: tariff || 'A', cardColor: color || 'grad1', userName: name || 'Владелец' };
    }
    
    function showStyledResult(success, msg, cb) {
        let modal = document.createElement('div'); modal.className = 'modal-overlay';
        modal.innerHTML = `<div class="modal-content"><div class="spinner" id="rsSpinner"></div><p id="rsText">${msg}</p></div>`;
        document.body.appendChild(modal);
        setTimeout(() => {
            let sp = document.getElementById('rsSpinner');
            if(sp) {
                sp.style.animation = 'none'; sp.style.border = 'none';
                sp.innerHTML = `<div class="check-animation"><svg viewBox="0 0 60 60"><circle class="check-circle" cx="30" cy="30" r="28" stroke="${success?'#2affdf':'#ff4d6d'}" stroke-width="2"/><path class="${success?'check-mark':'cross-mark'}" d="${success?'M20 30 L28 38 L42 22':'M22 22 L38 38 M38 22 L22 38'}" stroke="${success?'#2affdf':'#ff4d6d'}" stroke-width="3"/></svg></div>`;
                document.getElementById('rsText').innerText = msg;
                setTimeout(() => { modal.remove(); if(cb) cb(); }, 1500);
            }
        }, 1500);
    }
    
    // ========== PIN-ЗАПРОС (общий) ==========
    function requestPinWithCallback(callback, onCancel) {
        let enteredPin = '';
        let dotsHtml = '<div class="dots-container">' + Array(4).fill().map(() => '<div class="dot"></div>').join('') + '</div>';
        let numpadHtml = '<div class="numpad">' + ['1','2','3','4','5','6','7','8','9','0'].map(n => `<div class="numpad-btn" data-num="${n}">${n}</div>`).join('') + '<div class="numpad-btn delete-btn">⌫</div></div>';
        document.getElementById('app').innerHTML = `<div class="glass-card fade-in"><div class="bank-header"><div class="menu-icon-btn" id="backBtn">←</div></div><h3 style="color:#fff;text-align:center;">Введите PIN-код</h3>${dotsHtml}${numpadHtml}</div>`;
        document.getElementById('backBtn').onclick = () => { if(onCancel) onCancel(); else renderMainBank(); };
        function updateDots() { document.querySelectorAll('.dot').forEach((d,i) => { if(i<enteredPin.length) d.classList.add('active'); else d.classList.remove('active'); d.classList.remove('error','success'); }); }
        function errorAndClear() { document.querySelectorAll('.dot').forEach(d => d.classList.add('error')); document.querySelector('.dots-container').classList.add('shake'); setTimeout(() => { document.querySelector('.dots-container').classList.remove('shake'); enteredPin = ''; updateDots(); }, 1000); }
        function checkPin() { if(enteredPin.length===4) { if(enteredPin===currentUser.pinCode) { callback(); } else errorAndClear(); } }
        document.querySelectorAll('.numpad-btn').forEach(btn => { btn.onclick = () => { let v = btn.dataset.num; if(v && enteredPin.length<4) { enteredPin += v; updateDots(); checkPin(); } else if(btn.classList.contains('delete-btn')) { enteredPin = enteredPin.slice(0,-1); updateDots(); } }; });
        window.addEventListener('keydown', function keyHandler(e) { if(/^\d$/.test(e.key) && enteredPin.length<4) { enteredPin += e.key; updateDots(); checkPin(); } else if(e.key === 'Backspace') { enteredPin = enteredPin.slice(0,-1); updateDots(); } window.removeEventListener('keydown', keyHandler); });
        updateDots();
    }
    
    // ========== НОВАЯ СТРАНИЦА ПЕРЕВОДА (ИСПРАВЛЕНА) ==========
    let transferData = { type: 'card', targetCard: '', amount: 0, currency: 'BYN', cryptoCoin: 'USDT', cryptoAddress: '', cryptoMemo: '', cryptoAmount: 0 };
    
    function showTransferPage() {
        let activeTab = 'card';
        let selectedCrypto = 'USDT';
        let cryptoAmount = 0;
        let cardNumber = '';
        let amount = 0;
        let currency = 'BYN';
        let cryptoAddress = '';
        let cryptoMemo = '';
        
        function renderTransferUI() {
            let html = `<div class="glass-card fade-in"><div class="bank-header"><div class="menu-icon-btn" id="backBtn">←</div></div><h3 style="color:#fff;text-align:center;">Перевод</h3><div class="tab-container"><div class="tab ${activeTab==='card'?'active':''}" data-tab="card">На карту</div><div class="tab ${activeTab==='crypto'?'active':''}" data-tab="crypto">Крипто перевод</div></div>`;
            if(activeTab === 'card') {
                html += `<div class="transfer-field"><input type="text" id="cardNumberInput" placeholder="9000 0000 0000 0000" value="${cardNumber}"></div>
                         <div class="currency-row"><input type="number" id="amountInput" placeholder="Сумма" value="${amount}" style="flex:1;"><div class="currency-selector" id="currencySelector"><div class="currency-option ${currency==='BYN'?'active':''}" data-curr="BYN">BYN</div><div class="currency-option ${currency==='USD'?'active':''}" data-curr="USD">USD</div><div class="currency-option ${currency==='EUR'?'active':''}" data-curr="EUR">EUR</div></div></div>
                         <button class="btn-primary" id="nextBtn">Далее</button>`;
            } else {
                let cryptoOptions = '';
                for(let coin of cryptoList) {
                    let change = (Math.random() * 10 - 5).toFixed(2);
                    let changeClass = change >= 0 ? 'up' : 'down';
                    let changeSymbol = change >= 0 ? '▲' : '▼';
                    cryptoOptions += `<div class="crypto-item ${selectedCrypto===coin?'selected':''}" data-coin="${coin}">
                                        <div class="crypto-avatar">${coin.slice(0,2)}</div>
                                        <div class="crypto-info"><div class="crypto-name">${coin}</div><div class="crypto-price">$${cryptoPrices[coin].toLocaleString()}</div></div>
                                        <div class="crypto-change ${changeClass}">${changeSymbol} ${Math.abs(change)}%</div>
                                    </div>`;
                }
                html += `<div class="crypto-select-list">${cryptoOptions}</div>
                         <div class="transfer-field"><input type="text" id="cryptoAddressInput" placeholder="Адрес кошелька" value="${escapeHtml(cryptoAddress)}"></div>
                         <div class="transfer-field"><input type="text" id="cryptoMemoInput" placeholder="Комментарий / Memo (опционально)" value="${escapeHtml(cryptoMemo)}"></div>
                         <div class="currency-row"><input type="number" id="cryptoAmountInput" placeholder="Количество" value="${cryptoAmount}" style="flex:1;"><div style="color:#bbd4ff; margin-left:0.5rem;">${selectedCrypto}</div></div>
                         <button class="btn-primary" id="nextBtn">Далее</button>`;
            }
            html += `</div>`;
            document.getElementById('app').innerHTML = html;
            document.getElementById('backBtn').onclick = () => renderMainBank();
            
            if(activeTab === 'card') {
                let cardInput = document.getElementById('cardNumberInput');
                cardInput.addEventListener('input', function(e) {
                    let val = e.target.value.replace(/\s/g,'').slice(0,16);
                    e.target.value = val.match(/.{1,4}/g)?.join(' ') || val;
                    cardNumber = e.target.value;
                });
                document.getElementById('amountInput').addEventListener('input', (e) => { amount = parseFloat(e.target.value) || 0; });
                document.querySelectorAll('.currency-option').forEach(opt => {
                    opt.onclick = () => { currency = opt.dataset.curr; renderTransferUI(); };
                });
                document.getElementById('nextBtn').onclick = () => {
                    let rawCard = cardNumber.replace(/\s/g,'');
                    if(rawCard.length !== 16 || !rawCard.startsWith('9')) { showStyledResult(false, 'Некорректный номер карты (должен начинаться на 9)'); return; }
                    if(amount <= 0) { showStyledResult(false, 'Укажите сумму'); return; }
                    let amountInBYN = currency === 'BYN' ? amount : (currency === 'USD' ? amount * exchangeRates.USD : amount * exchangeRates.EUR);
                    if(currentUser.balance < amountInBYN) { showStyledResult(false, 'Недостаточно средств'); return; }
                    let targetUser = allUsers.find(u => u.rawNumber === rawCard);
                    if(!targetUser) { showStyledResult(false, 'Карта получателя не найдена в системе'); return; }
                    transferData = { type: 'card', targetCard: rawCard, amount: amount, currency: currency, amountInBYN: amountInBYN, targetUser: targetUser };
                    showTransferCheck();
                };
            } else {
                document.querySelectorAll('.crypto-item').forEach(item => {
                    item.onclick = () => { selectedCrypto = item.dataset.coin; renderTransferUI(); };
                });
                let addrInput = document.getElementById('cryptoAddressInput');
                let memoInput = document.getElementById('cryptoMemoInput');
                let amountInput = document.getElementById('cryptoAmountInput');
                if(addrInput) addrInput.addEventListener('input', (e) => { cryptoAddress = e.target.value; });
                if(memoInput) memoInput.addEventListener('input', (e) => { cryptoMemo = e.target.value; });
                if(amountInput) amountInput.addEventListener('input', (e) => { cryptoAmount = parseFloat(e.target.value) || 0; });
                document.getElementById('nextBtn').onclick = () => {
                    if(!cryptoAddress.trim()) { showStyledResult(false, 'Введите адрес кошелька'); return; }
                    if(cryptoAmount <= 0) { showStyledResult(false, 'Введите количество'); return; }
                    let costInUSD = cryptoAmount * cryptoPrices[selectedCrypto];
                    let costInBYN = costInUSD * exchangeRates.USD;
                    if(currentUser.balance < costInBYN) { showStyledResult(false, 'Недостаточно средств'); return; }
                    transferData = { type: 'crypto', coin: selectedCrypto, address: cryptoAddress, memo: cryptoMemo, amount: cryptoAmount, costInBYN: costInBYN, costInUSD: costInUSD };
                    showTransferCheck();
                };
            }
        }
        
        function showTransferCheck() {
            let html = `<div class="glass-card fade-in"><div class="bank-header"><div class="menu-icon-btn" id="backBtn">←</div></div><h3 style="color:#fff;text-align:center;">Подтверждение перевода</h3>`;
            if(transferData.type === 'card') {
                html += `<div class="check-row"><div class="check-title">Получатель</div><div class="check-value">**** **** **** ${transferData.targetCard.slice(-4)}</div></div>
                         <div class="check-row"><div class="check-title">Сумма</div><div class="check-value">${transferData.amount} ${transferData.currency}</div></div>
                         <div class="check-row"><div class="check-title">Комиссия</div><div class="check-value">0 BYN</div></div>
                         <div class="check-row"><div class="check-title">Итого списание</div><div class="check-value">${transferData.amountInBYN.toFixed(2)} BYN</div></div>`;
            } else {
                html += `<div class="check-row"><div class="check-title">Криптовалюта</div><div class="check-value">${transferData.coin}</div></div>
                         <div class="check-row"><div class="check-title">Количество</div><div class="check-value">${transferData.amount} ${transferData.coin}</div></div>
                         <div class="check-row"><div class="check-title">Адрес</div><div class="check-value" style="word-break:break-all;">${transferData.address.length>25?transferData.address.slice(0,22)+'...':transferData.address}</div></div>
                         <div class="check-row"><div class="check-title">Memo</div><div class="check-value">${transferData.memo || '—'}</div></div>
                         <div class="check-row"><div class="check-title">Сумма в USD</div><div class="check-value">$${transferData.costInUSD.toFixed(2)}</div></div>
                         <div class="check-row"><div class="check-title">Списание (BYN)</div><div class="check-value">${transferData.costInBYN.toFixed(2)} BYN</div></div>`;
            }
            html += `<button class="btn-primary" id="confirmTransferBtn" style="margin-top:1.5rem;">Подтвердить</button></div>`;
            document.getElementById('app').innerHTML = html;
            document.getElementById('backBtn').onclick = () => renderTransferUI();
            document.getElementById('confirmTransferBtn').onclick = () => {
                requestPinWithCallback(() => {
                    // Повторный PIN успешен — выполняем перевод
                    if(transferData.type === 'card') {
                        let target = transferData.targetUser;
                        currentUser.balance -= transferData.amountInBYN;
                        target.balance += transferData.amountInBYN;
                        saveCurrentUser();
                        localStorage.setItem('webpay_all_users', JSON.stringify(allUsers));
                        addTransaction('Перевод', -transferData.amountInBYN, `Перевод на карту ${transferData.targetCard.slice(-4)}`);
                    } else {
                        currentUser.balance -= transferData.costInBYN;
                        saveCurrentUser();
                        addTransaction('Крипто перевод', -transferData.costInBYN, `Вывод ${transferData.amount} ${transferData.coin} на адрес ${transferData.address.slice(0,10)}...`);
                    }
                    // Показываем успешный чек
                    let successHtml = `<div class="glass-card fade-in" style="text-align:center;"><div class="check-animation" style="width:80px;height:80px;margin:0 auto 1rem;"><svg viewBox="0 0 60 60"><circle class="check-circle" cx="30" cy="30" r="28" stroke="#2affdf"/><path class="check-mark" d="M20 30 L28 38 L42 22" stroke="#2affdf"/></svg></div><h2 style="color:#fff;">Готово!</h2><p style="color:#bbd4ff; margin:1rem 0;">Перевод выполнен успешно</p><button class="btn-primary" id="finishTransferBtn">Вернуться в банк</button></div>`;
                    document.getElementById('app').innerHTML = successHtml;
                    document.getElementById('finishTransferBtn').onclick = () => renderMainBank();
                }, () => { renderTransferUI(); });
            };
        }
        
        renderTransferUI();
    }
    
    // ========== ТЕРМИНАЛ ==========
    let nfcActive = false, nfcReader = null;
    function showTerminalPinScreen() { requestPinWithCallback(() => showTerminalPaymentScreen(), () => renderMainBank()); }
    async function stopNFC() { if(nfcReader) { try { await nfcReader.stop(); } catch(e) {} nfcReader = null; } nfcActive = false; }
    async function showTerminalPaymentScreen() {
        document.getElementById('app').innerHTML = `<div class="glass-card fade-in"><div class="bank-header"><div class="menu-icon-btn" id="backBtn">←</div></div><h3 style="color:#fff;text-align:center;">Оплата по терминалу</h3><div class="terminal-card"><div id="cardImg" class="card-image"><div>WebPay</div><div>**** **** **** ${currentUser?.cardNumber?.slice(-4)||'0000'}</div></div><div id="signalWaves" class="signal-waves"><div class="wave"></div><div class="wave"></div><div class="wave"></div><div class="wave"></div></div><div id="termStatus" class="terminal-status">Подготовка...</div></div></div>`;
        document.getElementById('backBtn').onclick = () => { if(nfcActive) stopNFC(); renderMainBank(); };
        let cardImg = document.getElementById('cardImg'), waves = document.querySelectorAll('.wave'), statusDiv = document.getElementById('termStatus');
        setTimeout(() => {
            cardImg.classList.add('animate');
            setTimeout(() => cardImg.classList.remove('animate'), 800);
            let level = 0;
            let iv = setInterval(() => {
                if(level < waves.length) { waves[level].classList.add('active'); level++; }
                else { clearInterval(iv); statusDiv.innerText = 'Ожидание прислонения к NFC метке'; startNFCListening(); }
            }, 300);
        }, 100);
    }
    async function startNFCListening() {
        if(!window.NDEFReader) { document.getElementById('termStatus').innerText = 'NFC не поддерживается. Нужен Android + HTTPS'; return; }
        if(nfcActive) return;
        try {
            let reader = new NDEFReader(); nfcReader = reader; nfcActive = true;
            await reader.scan();
            reader.onreading = async () => {
                let waves = document.querySelectorAll('.wave');
                if(currentUser.balance < 1) { document.getElementById('termStatus').innerText = 'Недостаточно средств (нужен 1 BYN)'; waves.forEach(w => { w.classList.remove('active'); w.classList.add('error'); }); setTimeout(() => { if(nfcReader) stopNFC(); }, 2000); return; }
                waves.forEach(w => { w.classList.remove('active'); w.classList.add('green'); });
                document.getElementById('termStatus').innerText = 'Оплата прошла успешно!';
                currentUser.balance -= 1; saveCurrentUser(); addTransaction('Оплата по терминалу', -1, 'Оплата через NFC');
                await reader.stop(); nfcActive = false;
                setTimeout(() => renderMainBank(), 2000);
            };
            reader.onreadingerror = () => { document.getElementById('termStatus').innerText = 'Ошибка чтения NFC'; setTimeout(() => { if(nfcReader) stopNFC(); }, 2000); };
        } catch(e) { document.getElementById('termStatus').innerText = 'Ошибка NFC: ' + e.message; nfcActive = false; }
    }

ight="12" rx="2"/><path d="M3 10h18"/><path d="M7 15h1"/><path d="M11 15h2"/></svg></div><span>Данные карты</span></div></div><div class="crypto-list"><div style="margin-bottom:0.5rem;color:#fff;">Курсы криптовалют (USD)</div>${cryptoList.map(c=>`<div class="crypto-row"><span>${c}</span><span>$${cryptoPrices[c].toLocaleString()}</span></div>`).join('')}</div></div>`;
        document.getElementById('settingsBtn').onclick = showSettingsPanel;

        document.getElementById('topupBtn').onclick = showGooglePayModal;
        document.getElementById('withdrawBtn').onclick = showWithdrawModal;
        document.getElementById('historyBtn').onclick = showHistoryPanel;
        document.getElementById('cardDetailsBtn').onclick = () => requestPinForCardDetails();
    }
    
    // ========== ОСТАЛЬНЫЕ ФУНКЦИИ (настройки, история, данные карты, вывод, пополнение) ==========
    function showSettingsPanel() { document.getElementById('app').innerHTML = `<div class="glass-card fade-in"><div class="bank-header"><div class="menu-icon-btn" id="backBankBtn">←</div></div><h3 style="color:#fff;text-align:center;">Настройки</h3><div class="settings-row"><span class="settings-label">Тёмная тема</span><div class="theme-switch" id="themeSwitch"></div></div><div class="settings-row"><span class="settings-label">Валюта</span><select id="currencySelect" class="currency-select"><option value="BYN">BYN</option><option value="USD">USD</option><option value="EUR">EUR</option></select></div><div class="settings-row"><span class="settings-label">Сменить PIN</span><button class="btn-primary btn-small" id="changePinBtn">Сменить</button></div><div class="settings-row"><span class="settings-label">Выйти</span><button class="btn-secondary btn-small" id="logoutBtn">Выйти</button></div></div>`; document.getElementById('backBankBtn').onclick = renderMainBank; document.getElementById('themeSwitch').onclick = () => document.body.classList.toggle('light'); document.getElementById('currencySelect').value = currentCurrency; document.getElementById('currencySelect').onchange = (e) => { currentCurrency = e.target.value; renderMainBank(); }; document.getElementById('changePinBtn').onclick = () => { showStyledResult(true, 'Демо-смена PIN'); }; document.getElementById('logoutBtn').onclick = () => { if(nfcActive) stopNFC(); currentUser = null; isLoggedIn = false; localStorage.removeItem('webpay_user'); renderWelcome(); }; }
    function showHistoryPanel() { document.getElementById('app').innerHTML = `<div class="glass-card fade-in"><div class="bank-header"><div class="menu-icon-btn" id="backBankBtn">←</div></div><h3 style="color:#fff;text-align:center;">История</h3><div class="history-list">${transactions.length===0?'<div style="color:#fff;text-align:center;padding:2rem;">Нет операций</div>':transactions.map(t=>`<div class="history-item"><strong>${t.type}</strong> ${t.amount} BYN<br><small>${t.details}</small><br><span style="font-size:0.6rem;">${t.date}</span></div>`).join('')}</div></div>`; document.getElementById('backBankBtn').onclick = renderMainBank; }
    function requestPinForCardDetails() { let modal = document.createElement('div'); modal.className = 'modal-overlay'; modal.innerHTML = `<div class="modal-content"><h3>Введите PIN</h3><input id="pinInput" type="password" maxlength="4"><div class="two-buttons"><button class="btn-primary" id="submitPin">OK</button><button class="btn-secondary" id="cancelPin">Отмена</button></div></div>`; document.body.appendChild(modal); document.getElementById('submitPin').onclick = () => { if(document.getElementById('pinInput').value === currentUser.pinCode) { modal.remove(); showStyledResult(true, 'Проверка пройдена', () => { document.getElementById('app').innerHTML = `<div class="glass-card fade-in"><div class="bank-header"><div class="menu-icon-btn" id="backBankBtn">←</div></div><h3 style="color:#fff;">Данные карты</h3><div><p><strong>Номер:</strong> ${currentUser.cardNumber}</p><p><strong>Срок:</strong> ${currentUser.expiry}</p><p><strong>CVV:</strong> ${currentUser.cvv}</p></div></div>`; document.getElementById('backBankBtn').onclick = renderMainBank; }); } else { modal.remove(); showStyledResult(false, 'Неверный PIN'); } }; document.getElementById('cancelPin').onclick = () => modal.remove(); }
    function showWithdrawModal() { let modal = document.createElement('div'); modal.className = 'modal-overlay'; modal.innerHTML = `<div class="modal-content"><h3>Вывод в крипту</h3><select id="cryptoSelect">${cryptoList.map(c=>`<option value="${c}">${c}</option>`).join('')}</select><input id="cryptoAmount" type="number" placeholder="Количество"><div class="two-buttons"><button class="btn-primary" id="confirmBtn">Вывести</button><button class="btn-secondary" id="cancelBtn">Отмена</button></div></div>`; document.body.appendChild(modal); document.getElementById('confirmBtn').onclick = () => { let sel = document.getElementById('cryptoSelect').value, amt = parseFloat(document.getElementById('cryptoAmount').value); if(isNaN(amt)||amt<=0) { showStyledResult(false,'Введите сумму'); modal.remove(); return; } let cost = amt * cryptoPrices[sel] * exchangeRates.USD; if(currentUser.balance < cost) { showStyledResult(false,'Недостаточно средств'); modal.remove(); return; } currentUser.balance -= cost; saveCurrentUser(); addTransaction('Вывод', -cost, `Вывод ${amt} ${sel}`); modal.remove(); showStyledResult(true, `Выведено ${amt} ${sel}`, () => renderMainBank()); }; document.getElementById('cancelBtn').onclick = () => modal.remove(); }
    function showGooglePayModal() { let modal = document.createElement('div'); modal.className = 'modal-overlay'; modal.innerHTML = `<div class="modal-content"><h3>Пополнение</h3><select id="cryptoSelect">${cryptoList.map(c=>`<option value="${c}">${c} ($${cryptoPrices[c]})</option>`).join('')}</select><input id="cryptoAmount" type="number" placeholder="Количество"><div class="two-buttons"><button class="btn-primary" id="nextBtn">Далее</button><button class="btn-secondary" id="cancelModal">Отмена</button></div></div>`; document.body.appendChild(modal); document.getElementById('nextBtn').onclick = () => { let sel = document.getElementById('cryptoSelect').value, amt = parseFloat(document.getElementById('cryptoAmount').value); if(isNaN(amt)||amt<=0){ showStyledResult(false,'Введите сумму'); modal.remove(); return; } let usd = amt * cryptoPrices[sel]; modal.remove(); let gpModal = document.createElement('div'); gpModal.className = 'gp-modal'; gpModal.innerHTML = `<div><img src="https://www.gstatic.com/pay/acceptance/images/product/pay_with_google.png" style="height:30px;"></div><div class="gp-amount">${amt} ${sel}</div><div>на сумму</div><div class="gp-amount">$${usd.toFixed(2)} USD</div><button class="gp-btn" id="confirmGpBuy">Купить в один клик</button><button id="closeGp" style="margin-top:1rem;background:none;border:none;color:#666;">Отмена</button></div>`; document.body.appendChild(gpModal); document.getElementById('confirmGpBuy').onclick = () => { gpModal.innerHTML = `<div><img src="https://www.gstatic.com/pay/acceptance/images/product/pay_with_google.png" style="height:30px;"></div><div class="spinner" style="width:40px;height:40px;"></div><div>Обработка...</div>`; setTimeout(() => { gpModal.innerHTML = `<div><img src="https://www.gstatic.com/pay/acceptance/images/product/pay_with_google.png" style="height:30px;"></div><div class="check-animation" style="width:50px;height:50px;"><svg viewBox="0 0 60 60"><circle class="check-circle" cx="30" cy="30" r="28" stroke="#2affdf"/><path class="check-mark" d="M20 30 L28 38 L42 22" stroke="#2affdf"/></svg></div><div>Оплата прошла успешно!</div>`; let byn = usd * exchangeRates.USD; currentUser.balance += byn; saveCurrentUser(); addTransaction('Пополнение', byn, `Покупка ${amt} ${sel}`); setTimeout(() => { gpModal.remove(); renderMainBank(); }, 1500); }, 2000); }; document.getElementById('closeGp').onclick = () => gpModal.remove(); }; document.getElementById('cancelModal').onclick = () => modal.remove(); }
    
    // ========== СОЗДАНИЕ КАРТЫ ==========
    function renderWelcome() { document.getElementById('app').innerHTML = `<div class="glass-card fade-in"><div class="logo"><h1>WebPay</h1><div class="logo-sub">крипто-кошелёк</div></div><div class="btn-start-wrapper" style="display:flex;justify-content:center;"><button class="btn-primary" id="startBtn" style="padding:0.8rem 2rem;font-size:1.2rem;">Начать</button></div></div>`; document.getElementById('startBtn').onclick = () => renderChoice(); }
    function renderChoice() { document.getElementById('app').innerHTML = `<div class="glass-card fade-in"><div class="logo"><h1>WebPay</h1><div class="logo-sub">выберите действие</div></div><div class="actions-grid" style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;"><div class="action-card" id="importBtn"><div class="neon-icon"><svg width="45" viewBox="0 0 100 100"><rect x="20" y="40" width="45" height="28" rx="5" stroke="#2affdf" fill="none"/><path d="M65 52 L78 52 L78 48 L85 55 L78 62 L78 58 L65 58" fill="#2affdf"/></svg></div><div class="action-title">Импортировать карту</div><div class="action-desc">Перенесите существующий кошелёк</div></div><div class="action-card" id="createBtn"><div class="neon-icon"><svg width="45" viewBox="0 0 100 100"><rect x="25" y="35" width="45" height="32" rx="6" stroke="#0ff" fill="none"/><path d="M52 48 L52 40 L60 48 L52 48Z" fill="#0ff"/></svg></div><div class="action-title">Создать новый кошелёк</div><div class="action-desc">Начните с нуля</div></div></div></div>`; document.getElementById('importBtn').onclick = renderImportStep1; document.getElementById('createBtn').onclick = () => { userData = { firstName:'', lastName:'', patronymic:'', birthDate:'', city:'', address:'', passportCode:'', issueDate:'', expiryDate:'', passportPhoto:null, agreeTerms:false, cardColor:'grad1', tariff:'A', consents:{insurance:false,marketing:false,cardIssue:false}, pinCode:'' }; renderStep1(); }; }
    function renderImportStep1() { document.getElementById('app').innerHTML = `<div class="glass-card fade-in"><div class="logo"><h1>WebPay</h1></div><div style="text-align:center"><div class="step-badge">импорт карты</div><div class="step-title">Введите данные</div></div><div class="form-group"><label>Номер карты</label><input id="cardNum" placeholder="0000 0000 0000 0000"><div id="cardNumErr" class="error-message"></div></div><div class="form-group"><label>Срок (MM/YY)</label><input id="expiry" placeholder="12/28"><div id="expiryErr" class="error-message"></div></div><div class="form-group"><label>ID паспорта VS</label><input id="passId" placeholder="VH000000X"><div id="passIdErr" class="error-message"></div></div><div class="buttons-row"><button class="btn-secondary" id="backChoice">Назад</button><button class="btn-primary" id="importBtn">Импортировать</button></div></div>`; let cn = document.getElementById('cardNum'), ex = document.getElementById('expiry'), pid = document.getElementById('passId'), imp = document.getElementById('importBtn'); cn.addEventListener('input', function(e) { let v = e.target.value.replace(/\s/g,'').slice(0,16); e.target.value = v.match(/.{1,4}/g)?.join(' ') || v; validate(); }); function validate() { let raw = cn.value.replace(/\s/g,''), valid = true; if(!raw || raw.length!==16 || !raw.startsWith('9')) { document.getElementById('cardNumErr').innerText='Карта должна начинаться на 9'; valid=false; } else document.getElementById('cardNumErr').innerText=''; if(!ex.value.match(/^\d{2}\/\d{2}$/)) { document.getElementById('expiryErr').innerText='Формат MM/YY'; valid=false; } else document.getElementById('expiryErr').innerText=''; if(!pid.value.match(/^VH[A-Z0-9]{6,7}$/i)) { document.getElementById('passIdErr').innerText='Формат VH000000X'; valid=false; } else document.getElementById('passIdErr').innerText=''; imp.disabled=!valid; if(valid) window.importRaw = raw; } ex.addEventListener('input',validate); pid.addEventListener('input',validate); validate(); document.getElementById('backChoice').onclick = () => renderChoice(); imp.onclick = () => { if(!imp.disabled) { let found = allUsers.find(u => u.rawNumber === window.importRaw); if(found) { currentUser = found; isLoggedIn = true; saveCurrentUser(); loadTransactions(); let modal = document.createElement('div'); modal.className = 'modal-overlay'; modal.innerHTML = `<div class="modal-content"><div class="spinner"></div><p>Импортируем...</p></div>`; document.body.appendChild(modal); setTimeout(() => { modal.remove(); renderMainBank(); }, 1500); } else showStyledResult(false, 'Карта не найдена'); } }; }
    function renderStep1() { let fields = ['firstName','lastName','patronymic','birthDate','city','address'], labels = ['Имя','Фамилия','Отчество','Дата рождения','Город','Адрес'], types = ['text','text','text','date','text','text']; let html = `<div class="glass-card fade-in"><div class="logo"><h1>WebPay</h1></div><div style="text-align:center"><div class="step-badge">шаг 1/4</div><div class="step-title">Личные данные</div></div>`; fields.forEach((f,i)=> html += `<div class="form-group"><label>${labels[i]}${f!=='patronymic'?' *':''}</label><input type="${types[i]}" id="${f}" value="${escapeHtml(userData[f])}"><div id="${f}Err" class="error-message"></div></div>`); html += `<div class="buttons-row"><button class="btn-secondary" id="backChoice">Назад</button><button class="btn-primary" id="nextStep1">Далее</button></div></div>`; document.getElementById('app').innerHTML = html; let validators = [v=>v.trim()?'':'Имя обязательно', v=>v.trim()?'':'Фамилия обязательна', v=>v.trim()&&v.length<2?'Минимум 2':'', v=>{if(!v)return 'Дата';let d=new Date(v);if(isNaN(d))return 'Дата';let age=new Date().getFullYear()-d.getFullYear();return age<18?'18 лет':'';}, v=>v.trim()?'':'Город', v=>v.trim().length>4?'':'Адрес полный']; function validateAll(){let ok=true; fields.forEach((f,i)=>{let val=document.getElementById(f).value, err=validators[i](val); document.getElementById(`${f}Err`).innerText=err; if(err) ok=false; userData[f]=val;}); document.getElementById('nextStep1').disabled=!ok;} fields.forEach(f=>document.getElementById(f).addEventListener('input',validateAll)); validateAll(); document.getElementById('backChoice').onclick = ()=>renderChoice(); document.getElementById('nextStep1').onclick = ()=> { if(!document.getElementById('nextStep1').disabled) renderStep2(); }; }
    function renderStep2() { document.getElementById('app').innerHTML = `<div class="glass-card fade-in"><div class="logo"><h1>WebPay</h1></div><div style="text-align:center"><div class="step-badge">шаг 2/4</div><div class="step-title">Паспортные данные</div></div><div class="form-group"><label>Страна</label><div style="background:rgba(2,8,18,0.7);border-radius:1.2rem;padding:0.8rem;"><span style="background:linear-gradient(135deg,#fff 50%,#ff8c42 50%);width:24px;height:16px;display:inline-block;border-radius:3px;"></span> Восьмилапка Сити (VS)</div></div><div class="form-group"><label>Код паспорта (VH000000X)</label><input id="passportCode" value="${userData.passportCode}"><div id="passportCodeErr" class="error-message"></div></div><div class="form-group"><label>Дата выдачи</label><input type="date" id="issueDate" value="${userData.issueDate}"><div id="issueDateErr"></div></div><div class="form-group"><label>Дата окончания</label><input type="date" id="expiryDate" value="${userData.expiryDate}"><div id="expiryDateErr"></div></div><div class="form-group"><label>Фото</label><div id="photoUpload" style="border:1px dashed #2affdf;border-radius:1rem;padding:0.7rem;text-align:center;cursor:pointer;">📄 Загрузить</div><input type="file" id="photoInput" style="display:none"><div id="photoErr"></div><div id="photoName" style="color:#bbd4ff;"></div></div><div class="checkbox-group"><input type="checkbox" id="agreeTerms" ${userData.agreeTerms?'checked':''}><label>Согласие</label></div><div class="buttons-row"><button class="btn-secondary" id="backStep1">Назад</button><button class="btn-primary" id="nextStep2">Далее</button></div></div>`; let photoFile = userData.passportPhoto; document.getElementById('photoUpload').onclick = ()=>document.getElementById('photoInput').click(); document.getElementById('photoInput').onchange = e=>{ if(e.target.files[0]){ photoFile=e.target.files[0]; document.getElementById('photoName').innerText=e.target.files[0].name; validate(); } }; function validate() { let passErr = /^VH[A-Z0-9]{6,7}$/i.test(document.getElementById('passportCode').value)?'':'Формат VH000000X'; let issueErr = document.getElementById('issueDate').value?'':'Дата выдачи'; let expiryErr = document.getElementById('expiryDate').value?'':'Дата окончания'; let photoErr = photoFile?'':'Загрузите фото'; document.getElementById('passportCodeErr').innerText=passErr; document.getElementById('issueDateErr').innerText=issueErr; document.getElementById('expiryDateErr').innerText=expiryErr; document.getElementById('photoErr').innerText=photoErr; let ok = !passErr && !issueErr && !expiryErr && !photoErr && document.getElementById('agreeTerms').checked; document.getElementById('nextStep2').disabled=!ok; if(ok){ userData.passportCode=document.getElementById('passportCode').value; userData.issueDate=document.getElementById('issueDate').value; userData.expiryDate=document.getElementById('expiryDate').value; userData.agreeTerms=true; userData.passportPhoto=photoFile; } } document.getElementById('passportCode').addEventListener('input',validate); document.getElementById('issueDate').addEventListener('input',validate); document.getElementById('expiryDate').addEventListener('input',validate); document.getElementById('agreeTerms').addEventListener('change',validate); validate(); document.getElementById('backStep1').onclick = ()=>renderStep1(); document.getElementById('nextStep2').onclick = ()=> { if(!document.getElementById('nextStep2').disabled) { let modal = document.createElement('div'); modal.className = 'modal-overlay'; modal.innerHTML = `<div class="modal-content"><div class="spinner"></div><p>Проходим верификацию...</p></div>`; document.body.appendChild(modal); setTimeout(()=>{ modal.remove(); renderStep3(); },2000); } }; }
    function renderStep3() { let g = gradients; document.getElementById('app').innerHTML = `<div class="glass-card fade-in"><div class="logo"><h1>WebPay</h1></div><div style="text-align:center"><div class="step-badge">шаг 3/4</div><div class="step-title">Оформление карты</div></div><div id="cardPreview" class="card-preview" style="background:${g[userData.cardColor]||g.grad1}"><div class="card-header"><span>WebPay</span><span class="card-tariff" id="cardTariffLabel">${userData.tariff}</span></div><div class="card-number">0000 0000 0000 0000</div><div>Срок: 00/00</div></div><div class="color-palette">${Object.keys(g).map(k=>`<div class="color-circle" data-color="${k}" style="background:${g[k]}"></div>`).join('')}</div><div class="tariff-buttons">${['A','A+','B','B+','D','D+'].map(t=>`<div class="tariff-btn ${userData.tariff===t?'active':''}" data-tariff="${t}">${t}</div>`).join('')}</div><div class="checkbox-group"><input type="checkbox" id="consentIssue" ${userData.consents.cardIssue?'checked':''}><label>Согласие на выпуск карты</label></div><div class="checkbox-group"><input type="checkbox" id="consentInsurance" ${userData.consents.insurance?'checked':''}><label>Страхование</label></div><div class="checkbox-group"><input type="checkbox" id="consentMarketing" ${userData.consents.marketing?'checked':''}><label>Маркетинг</label></div><div class="buttons-row"><button class="btn-secondary" id="backStep2">Назад</button><button class="btn-primary" id="nextStep3">Далее</button></div></div>`; document.querySelectorAll('.color-circle').forEach(c=>c.addEventListener('click',()=>{ userData.cardColor=c.dataset.color; document.getElementById('cardPreview').style.background=g[userData.cardColor]; })); document.querySelectorAll('.tariff-btn').forEach(b=>b.addEventListener('click',()=>{ document.querySelectorAll('.tariff-btn').forEach(bb=>bb.classList.remove('active')); b.classList.add('active'); userData.tariff=b.dataset.tariff; document.getElementById('cardTariffLabel').innerText=userData.tariff; })); document.getElementById('consentIssue').onchange=e=>userData.consents.cardIssue=e.target.checked; document.getElementById('consentInsurance').onchange=e=>userData.consents.insurance=e.target.checked; document.getElementById('consentMarketing').onchange=e=>userData.consents.marketing=e.target.checked; document.getElementById('backStep2').onclick = ()=>renderStep2(); document.getElementById('nextStep3').onclick = ()=>{ if(userData.consents.cardIssue) renderStep4(); else showStyledResult(false,'Согласие обязательно'); }; }
    function renderStep4() { document.getElementById('app').innerHTML = `<div class="glass-card fade-in"><div class="logo"><h1>WebPay</h1></div><div style="text-align:center"><div class="step-badge">шаг 4/4</div><div class="step-title">PIN-код</div></div><div class="form-group"><label>PIN (4 цифры)</label><input type="password" id="pin1" maxlength="4"></div><div class="form-group"><label>Подтвердите</label><input type="password" id="pin2" maxlength="4"></div><div id="pinError" class="error-message"></div><div class="buttons-row"><button class="btn-secondary" id="backStep3">Назад</button><button class="btn-primary" id="finishBtn">Завершить</button></div></div>`; let p1=document.getElementById('pin1'), p2=document.getElementById('pin2'), finish=document.getElementById('finishBtn'); function validatePin(){ let a=p1.value, b=p2.value; if(a.length===4 && b.length===4 && a===b && /^\d{4}$/.test(a)){ document.getElementById('pinError').innerText=''; finish.disabled=false; userData.pinCode=a; } else { document.getElementById('pinError').innerText=a.length!==4?'4 цифры':'PIN не совпадают'; finish.disabled=true; } } p1.addEventListener('input',validatePin); p2.addEventListener('input',validatePin); document.getElementById('backStep3').onclick = ()=>renderStep3(); finish.onclick = () => { if(!finish.disabled) { let modal = document.createElement('div'); modal.className = 'modal-overlay'; modal.innerHTML = `<div class="modal-content"><div class="spinner" id="finalSpinner"></div><p>Готовим карту...</p></div>`; document.body.appendChild(modal); setTimeout(() => { let sp = document.getElementById('finalSpinner'); if(sp) { sp.style.animation = 'none'; sp.style.border = 'none'; sp.innerHTML = `<div class="check-animation"><svg viewBox="0 0 60 60"><circle class="check-circle" cx="30" cy="30" r="28" stroke="#2affdf"/><path class="check-mark" d="M20 30 L28 38 L42 22" stroke="#2affdf"/></svg></div>`; document.querySelector('#finalSpinner').parentElement.innerHTML += '<p style="color:#2affdf;">Готово!</p>'; setTimeout(() => { modal.remove(); finalizeCreation(); }, 1500); } }, 2000); } }; }
    function finalizeCreation() { currentUser = generateNewCard(userData.firstName || 'User', userData.tariff, userData.cardColor); currentUser.pinCode = userData.pinCode; allUsers.push(currentUser); localStorage.setItem('webpay_all_users', JSON.stringify(allUsers)); isLoggedIn = true; saveCurrentUser(); loadTransactions(); renderMainBank(); }
    
    if(localStorage.getItem('webpay_theme') === 'light') document.body.classList.add('light');
    new MutationObserver(() => localStorage.setItem('webpay_theme', document.body.classList.contains('light') ? 'light' : 'dark')).observe(document.body, {attributes: true, attributeFilter: ['class']});
    loadAllUsers();
    let saved = localStorage.getItem('webpay_user');
    if(saved) { currentUser = JSON.parse(saved); isLoggedIn = true; loadTransactions(); renderMainBank(); } else renderWelcome();
</script>
